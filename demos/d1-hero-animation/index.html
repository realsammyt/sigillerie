<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sigillerie · Hero Animation Smoke Test</title>
<style>
  :root {
    --paper: #FAF7F0;
    --ink: #1B1614;
    --quiet: #6E6862;
    --accent: #9A4B3D;
    --surface: #EFE9DD;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: #0a0a0a;
    overflow: hidden;
    font-family: 'Source Serif Pro', Georgia, 'Times New Roman', serif;
  }
  #stage-host { width: 100vw; height: 100vh; }
</style>

<!-- React + Babel from unpkg per modes/producer/react-setup.md -->
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>

<!-- Sigillerie animation engine (assets/animations.jsx) -->
<script type="text/babel" data-presets="env,react" src="../../assets/animations.jsx"></script>
</head>
<body>
<div id="stage-host"></div>

<script type="text/babel" data-presets="env,react">
const { Stage, Sprite, useSprite, useTime, useStageContext, Easing, interpolate } = window;

// title fades in and breathes
function Title() {
  const { t } = useSprite();
  const opacity = interpolate(t, [0, 0.4], [0, 1], Easing.expoOut);
  // subtle pulse using time
  const time = useTime();
  const pulse = 1 + Math.sin(time * 1.2) * 0.012;
  const styles = {
    position: 'absolute',
    left: '50%', top: '38%',
    transform: `translate(-50%, -50%) scale(${pulse})`,
    fontFamily: 'Source Serif Pro, Georgia, serif',
    fontSize: '180px',
    fontWeight: 400,
    color: 'var(--paper)',
    letterSpacing: '-0.02em',
    opacity,
  };
  return <div style={styles}>Sigillerie</div>;
}

// subtitle slides in from below
function Subtitle() {
  const { t } = useSprite();
  const dy = interpolate(t, [0, 0.5], [40, 0], Easing.expoOut);
  const opacity = interpolate(t, [0.1, 0.6], [0, 1], Easing.cubicOut);
  const styles = {
    position: 'absolute',
    left: '50%', top: '52%',
    transform: `translate(-50%, ${dy}px)`,
    fontFamily: '-apple-system, "Helvetica Neue", system-ui, sans-serif',
    fontSize: '24px',
    fontWeight: 300,
    color: 'var(--quiet)',
    letterSpacing: '0.4em',
    textTransform: 'uppercase',
    opacity,
  };
  return <div style={styles}>One sentence in. Real-studio design out.</div>;
}

// three cards reveal in a cascade
function Card({ index, label }) {
  const { t } = useSprite();
  const delay = index * 0.08;
  const local = Math.max(0, t - delay);
  const dy = interpolate(local, [0, 0.6], [60, 0], Easing.expoOut);
  const opacity = interpolate(local, [0, 0.6], [0, 1], Easing.cubicOut);
  const colors = ['#9A4B3D', '#1B1614', '#6E6862'];
  const styles = {
    width: '220px',
    height: '120px',
    background: 'var(--paper)',
    borderRadius: '6px',
    display: 'flex',
    alignItems: 'center',
    justifyContent: 'center',
    flexDirection: 'column',
    fontFamily: '-apple-system, "Helvetica Neue", sans-serif',
    transform: `translateY(${dy}px)`,
    opacity,
    boxShadow: '0 24px 48px rgba(0,0,0,0.35)',
    margin: '0 14px',
    color: colors[index],
  };
  return (
    <div style={styles}>
      <div style={{ fontSize: '36px', fontWeight: 600 }}>{label}</div>
      <div style={{ fontSize: '11px', letterSpacing: '0.3em', textTransform: 'uppercase', color: 'var(--quiet)', marginTop: '8px' }}>mode</div>
    </div>
  );
}

function Cards() {
  const styles = {
    position: 'absolute',
    left: '50%', top: '70%',
    transform: 'translate(-50%, -50%)',
    display: 'flex',
  };
  return (
    <div style={styles}>
      <Card index={0} label="Discovery" />
      <Card index={1} label="Producer" />
      <Card index={2} label="3D" />
    </div>
  );
}

// thin rule that draws across the bottom
function Rule() {
  const { t } = useSprite();
  const width = interpolate(t, [0, 0.8], [0, 60], Easing.expoOut);
  const styles = {
    position: 'absolute',
    left: '50%', bottom: '14%',
    transform: 'translateX(-50%)',
    width: `${width}vw`,
    height: '1px',
    background: 'var(--quiet)',
    opacity: 0.4,
  };
  return <div style={styles} />;
}

// signature mark
function Signature() {
  const { t } = useSprite();
  const opacity = interpolate(t, [0, 0.5], [0, 0.7], Easing.cubicOut);
  const styles = {
    position: 'absolute',
    right: '40px', bottom: '32px',
    fontFamily: 'monospace',
    fontSize: '11px',
    color: 'var(--quiet)',
    letterSpacing: '0.15em',
    opacity,
  };
  return <div style={styles}>HERO · v0.1 · SMOKE TEST</div>;
}

function App() {
  return (
    <Stage width={1920} height={1080} duration={8} loop={true} bgColor="#0a0a0a">
      <Sprite start={0.4} end={8}><Title /></Sprite>
      <Sprite start={1.2} end={8}><Subtitle /></Sprite>
      <Sprite start={2.4} end={8}><Cards /></Sprite>
      <Sprite start={1.8} end={8}><Rule /></Sprite>
      <Sprite start={3.5} end={8}><Signature /></Sprite>
    </Stage>
  );
}

ReactDOM.createRoot(document.getElementById('stage-host')).render(<App />);
</script>
</body>
</html>
