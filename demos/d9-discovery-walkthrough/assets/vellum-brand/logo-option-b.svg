<?xml version="1.0" encoding="UTF-8"?>
<!--
  Vellum · Logo Option B  ·  CHOSEN
  School: Eastern Minimalism (Kenya Hara, Whitespace)
  Posture: small mark + light sans wordmark. The mark is a single open arc,
  one calligraphic stroke. Negative space carries the weight.
  Why it fits Vellum: vibe-words "calm, technical, irreverent" anchor on whitespace.
  Flinch was loud-color (Pocket-2024 orange); this row defends against that.
  The mark reads as a page edge curling, or a thumb under a book spine,
  or a sunrise just barely cresting. Ambiguity is the point.
  Type: Inter Light, generous letter-spacing.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 240 80"
     width="240" height="80"
     role="img" aria-label="Vellum wordmark, Option B, Hara-Whitespace, chosen">
  <rect width="240" height="80" fill="#FAF7F0"/>
  <!-- Mark: single open arc, top-left third, 1.25 stroke, warm grey ink -->
  <g transform="translate(80, 22)">
    <path d="M 0 18 Q 12 -2, 28 12"
          fill="none"
          stroke="#6E6862"
          stroke-width="1.25"
          stroke-linecap="round"/>
  </g>
  <!-- Wordmark: thin sans, tracked open, sits low so the mark breathes -->
  <text x="120" y="62"
        font-family="'Inter', -apple-system, 'Helvetica Neue', system-ui, sans-serif"
        font-weight="300"
        font-size="16"
        letter-spacing="3.6"
        text-anchor="middle"
        fill="#1B1614">vellum</text>
</svg>
