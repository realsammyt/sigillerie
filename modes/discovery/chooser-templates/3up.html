<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sigillerie · Pick One</title>
<style>
  :root {
    --bg: #FAFAF7;
    --ink: #1F1A14;
    --ink-soft: #5A5048;
    --rule: #E6DFD2;
    --card: #FFFFFE;
    --accent: #6B3416;
    --focus: #B85C2E;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    font-size: clamp(14px, 1.6vw, 16px);
    line-height: 1.5;
    padding: clamp(16px, 4vw, 48px);
    min-height: 100vh;
  }
  header.page {
    max-width: 1280px;
    margin: 0 auto clamp(20px, 3vw, 36px) auto;
    border-bottom: 1px solid var(--rule);
    padding-bottom: clamp(12px, 2vw, 20px);
  }
  header.page h1 {
    font-family: ui-serif, Georgia, "Source Serif Pro", "Times New Roman", serif;
    font-weight: 500;
    font-size: clamp(22px, 3vw, 32px);
    letter-spacing: -0.01em;
    margin: 0 0 4px 0;
  }
  header.page p {
    margin: 0;
    color: var(--ink-soft);
    font-size: clamp(13px, 1.4vw, 15px);
  }
  main.grid {
    max-width: 1280px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(min(100%, 320px), 1fr));
    gap: clamp(16px, 2.5vw, 28px);
  }
  .card {
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: clamp(18px, 2.4vw, 28px);
    display: flex;
    flex-direction: column;
    gap: clamp(14px, 1.8vw, 20px);
    min-height: 460px;
  }
  .card header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 12px;
  }
  .letter {
    font-family: ui-serif, Georgia, serif;
    font-size: clamp(34px, 4vw, 44px);
    line-height: 1;
    color: var(--accent);
    font-weight: 500;
  }
  .name {
    font-family: ui-serif, Georgia, serif;
    font-size: clamp(16px, 1.8vw, 20px);
    margin: 0;
    font-weight: 500;
  }
  .artifact {
    flex: 1;
    min-height: 180px;
    display: flex;
    align-items: stretch;
    justify-content: stretch;
  }
  .artifact > * { width: 100%; }
  .artifact img {
    width: 100%;
    height: auto;
    max-height: 240px;
    object-fit: cover;
    border: 1px solid var(--rule);
    background: #EFE9DC;
  }
  .palette {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(40px, 1fr));
    gap: 0;
    border: 1px solid var(--rule);
    overflow: hidden;
    min-height: 120px;
  }
  .palette .swatch {
    aspect-ratio: 1 / 1.2;
    display: flex;
    align-items: flex-end;
    padding: 6px;
    font-size: 10px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    color: rgba(0,0,0,0.55);
    text-shadow: 0 1px 0 rgba(255,255,255,0.4);
  }
  .type-sample {
    border: 1px solid var(--rule);
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: #FBFAF6;
  }
  .type-sample .display {
    font-size: clamp(22px, 2.6vw, 30px);
    line-height: 1.1;
    letter-spacing: -0.01em;
  }
  .type-sample .body {
    font-size: 14px;
    color: var(--ink-soft);
  }
  .type-sample .label {
    font-size: 11px;
    color: var(--ink-soft);
    font-family: ui-monospace, monospace;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .voice-card {
    border: 1px solid var(--rule);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: #FBFAF6;
  }
  .voice-card .quote {
    font-family: ui-serif, Georgia, serif;
    font-size: 15px;
    line-height: 1.45;
    color: var(--ink);
    border-left: 2px solid var(--accent);
    padding-left: 10px;
  }
  .rationale {
    color: var(--ink-soft);
    font-size: clamp(13px, 1.4vw, 14px);
    line-height: 1.5;
    border-top: 1px dashed var(--rule);
    padding-top: 12px;
  }
  .pick {
    appearance: none;
    border: 1px solid var(--ink);
    background: var(--ink);
    color: var(--bg);
    font: inherit;
    font-weight: 500;
    padding: 12px 18px;
    cursor: pointer;
    border-radius: 2px;
    letter-spacing: 0.02em;
    transition: transform 0.08s ease;
  }
  .pick:hover { transform: translateY(-1px); }
  .pick:focus-visible {
    outline: 2px solid var(--focus);
    outline-offset: 3px;
  }
  .pick.picked {
    background: var(--accent);
    border-color: var(--accent);
  }
  footer.page {
    max-width: 1280px;
    margin: clamp(24px, 3vw, 40px) auto 0 auto;
    border-top: 1px solid var(--rule);
    padding-top: clamp(14px, 2vw, 22px);
    color: var(--ink-soft);
    font-size: 13px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  footer.page code {
    background: #EFE9DC;
    padding: 1px 6px;
    border-radius: 2px;
    font-size: 12px;
  }
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: var(--bg);
    padding: 10px 16px;
    border-radius: 2px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
    max-width: 90vw;
    text-align: center;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  @media (max-width: 600px) {
    .card { min-height: 0; }
  }
</style>
</head>
<body>

<header class="page">
  <h1>Three options. Pick one. Or mix.</h1>
  <p>Click a card. Or reply in chat with the code below.</p>
</header>

<main class="grid" id="grid" role="list" aria-label="Three direction options"></main>

<footer class="page">
  <div>Reply in chat for mix work: <code>A.logo + B.palette</code> · <code>B but warmer</code> · <code>none, regenerate</code></div>
  <div>Click writes pick to <code>discovery-pending-choice.json</code>. Falls back to clipboard.</div>
</footer>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script>
// Agent overwrites this block at runtime.
const OPTIONS = [
  {
    letter: 'A',
    name: 'Pentagram-Typographic IA',
    artifact: { type: 'image', src: 'option-a.png', alt: 'Direction A hero treatment' },
    rationale: 'Big serif. Strong grid. Reads like a magazine cover. Anchors on calm, technical vibe-words.'
  },
  {
    letter: 'B',
    name: 'Field.io Kinetic',
    artifact: { type: 'palette', colors: ['#F5E6D3', '#3A2618', '#B85C2E', '#8B7355', '#1F1A14'] },
    rationale: 'Warm earth core. Pulls from moodboard #4. Avoids the cold-tech blue you flinched.'
  },
  {
    letter: 'C',
    name: 'Hara Whitespace',
    artifact: {
      type: 'type-sample',
      display: 'Source Serif',
      body: 'Inter',
      sample: 'Things made well, used long.'
    },
    rationale: 'Quiet display, neutral body. Lots of air. Eastern minimalism row of the grid.'
  }
];

// ---- helpers ----
function el(tag, attrs, ...kids) {
  const node = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'class') node.className = v;
      else if (k === 'style') node.setAttribute('style', v);
      else if (k.startsWith('on')) node.addEventListener(k.slice(2), v);
      else if (v === true) node.setAttribute(k, '');
      else if (v !== false && v != null) node.setAttribute(k, v);
    }
  }
  for (const kid of kids) {
    if (kid == null) continue;
    if (typeof kid === 'string') node.appendChild(document.createTextNode(kid));
    else node.appendChild(kid);
  }
  return node;
}

// ---- renderers ----
function renderArtifact(a) {
  if (!a || !a.type) return el('div', { class: 'artifact' });
  if (a.type === 'image') {
    return el('div', { class: 'artifact' },
      el('img', { src: a.src, alt: a.alt || 'Option artifact', loading: 'lazy' })
    );
  }
  if (a.type === 'palette') {
    const wrap = el('div', { class: 'artifact' });
    const grid = el('div', { class: 'palette', role: 'img', 'aria-label': 'Palette swatches' });
    for (const c of a.colors || []) {
      const sw = el('div', { class: 'swatch', style: 'background:' + c }, c);
      grid.appendChild(sw);
    }
    wrap.appendChild(grid);
    return wrap;
  }
  if (a.type === 'type-sample') {
    return el('div', { class: 'artifact' },
      el('div', { class: 'type-sample' },
        el('div', { class: 'label' }, (a.display || '') + ' / ' + (a.body || '')),
        el('div', { class: 'display', style: 'font-family: ui-serif, Georgia, serif;' }, a.sample || ''),
        el('div', { class: 'body' }, 'Body sets in ' + (a.body || 'Inter') + '. Reads at small sizes. Holds long-form.')
      )
    );
  }
  if (a.type === 'voice-card') {
    const wrap = el('div', { class: 'artifact' });
    const card = el('div', { class: 'voice-card' });
    const quotes = (a.samples && a.samples.length) ? a.samples : [
      'Short. Plain. Doesn\'t shout.',
      'We make the thing. We ship the thing.',
      'No filler. No hedge. Say what it is.'
    ];
    for (const q of quotes.slice(0, 3)) {
      card.appendChild(el('div', { class: 'quote' }, q));
    }
    wrap.appendChild(card);
    return wrap;
  }
  return el('div', { class: 'artifact' }, JSON.stringify(a));
}

function renderCard(opt, idx) {
  const card = el('article', {
    class: 'card',
    role: 'listitem',
    'aria-label': 'Option ' + opt.letter + ' ' + (opt.name || '')
  });
  const head = el('header', null,
    el('span', { class: 'letter', 'aria-hidden': 'true' }, opt.letter),
    el('h2', { class: 'name' }, opt.name || '')
  );
  card.appendChild(head);
  card.appendChild(renderArtifact(opt.artifact));
  if (opt.rationale) {
    card.appendChild(el('p', { class: 'rationale' }, opt.rationale));
  }
  const btn = el('button', {
    class: 'pick',
    type: 'button',
    'data-letter': opt.letter,
    'aria-label': 'Pick option ' + opt.letter,
    onclick: () => submitPick(opt.letter, btn)
  }, 'Pick ' + opt.letter);
  card.appendChild(btn);
  return card;
}

// ---- pick + submit ----
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

async function submitPick(letter, btn) {
  document.querySelectorAll('.pick.picked').forEach(b => b.classList.remove('picked'));
  if (btn) btn.classList.add('picked');
  const payload = {
    phase: 3,
    pick: letter,
    timestamp: new Date().toISOString()
  };
  const body = JSON.stringify(payload);
  let posted = false;
  try {
    const res = await fetch('http://127.0.0.1:7717/discovery-pending-choice', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body
    });
    if (res.ok) posted = true;
  } catch (_) { /* fall through */ }
  if (posted) {
    showToast('Picked ' + letter + '. Saved.');
    return;
  }
  // Fallback: copy to clipboard.
  try {
    await navigator.clipboard.writeText(body);
    showToast('No local helper. Pick copied to clipboard. Paste in chat.');
  } catch (_) {
    showToast('Pick: ' + letter + '. Type it in chat.');
  }
}

// ---- keyboard ----
document.addEventListener('keydown', (e) => {
  const k = (e.key || '').toUpperCase();
  if (['A', 'B', 'C'].includes(k)) {
    const btn = document.querySelector('.pick[data-letter="' + k + '"]');
    if (btn) { btn.focus(); submitPick(k, btn); }
  }
});

// ---- mount ----
(function mount() {
  const grid = document.getElementById('grid');
  OPTIONS.forEach((o, i) => grid.appendChild(renderCard(o, i)));
})();
</script>
</body>
</html>
